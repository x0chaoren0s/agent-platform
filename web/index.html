    </div>
    <div>
      <div class="insp-section-title">可用工具 (${tools.length})</div>
      <div class="insp-tool-list">${toolsHtml}</div>
    </div>
    <div>
      <div class="insp-section-title">系统提示词</div>
      <div class="insp-prompt-tabs">
        <button class="insp-tab active" id="tabRaw">业务说明</button>
        <button class="insp-tab" id="tabFull">完整（含协议）</button>
      </div>
      <div class="insp-prompt-box" id="inspPromptBox">${escHtml(promptRaw)}</div>
    </div>
  `;
  const rawBtn = el('tabRaw');
  const fullBtn = el('tabFull');
  if (rawBtn) rawBtn.onclick = () => switchInspectorTab('raw', name);
  if (fullBtn) fullBtn.onclick = () => switchInspectorTab('full', name);
  inspectorCache[name]._promptRaw = promptRaw;
  inspectorCache[name]._promptFull = promptFull;
}
function switchInspectorTab(tab, name) {
  const cache = inspectorCache[name] || {};
  const text = tab === 'full' ? (cache._promptFull || '（无）') : (cache._promptRaw || '（无）');
  const box = el('inspPromptBox');
  if (box) box.textContent = text;
  const rawBtn = el('tabRaw');
  const fullBtn = el('tabFull');
  if (rawBtn) rawBtn.className = 'insp-tab' + (tab === 'raw' ? ' active' : '');
  if (fullBtn) fullBtn.className = 'insp-tab' + (tab === 'full' ? ' active' : '');
}
function closeAgentInspector() {
  el('agentInspector').classList.remove('open');
}

async function toggleSkill(agentName, skillId) {
  const cache = inspectorCache[agentName];
  if (!cache) return;
  if (cache.role === 'orchestrator' || cache.is_temp) {
    showToast('当前成员不支持修改 skills');
    return;
  }
  const mounted = Array.isArray(cache.skills) ? [...cache.skills] : [];
  const exists = mounted.includes(skillId);
  const next = exists ? mounted.filter(s => s !== skillId) : [...mounted, skillId];
  const res = await fetch(`/api/agents/${encodeURIComponent(agentName)}/skills`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ skills: next }),
  });
  const data = await res.json();
  if (!res.ok) {
    showToast('❌ ' + (data.detail || '更新 skills 失败'));
    return;
  }
  inspectorCache[agentName] = null;
  await openAgentInspector(agentName);
  showToast(`已${exists ? '卸载' : '挂载'} skill: ${skillId}`);
}
async function fetchPendingQuestions() {
  const res = await fetch(`/api/threads/${encodeURIComponent(THREAD_ID)}/questions?status=pending`);
  const data = await res.json();
  pendingQuestions = (data && data.data) || [];
  updateInboxBadge(pendingQuestions.length);
  renderInboxList(pendingQuestions);
  // After page reload the real-time q-card nodes no longer exist; recreate them so
  // jumpToQuestionBubble can find an anchor and the user can still answer in-chat.
  for (const q of pendingQuestions) {
    if (!document.getElementById(`q-card-${q.id}`)) {
      appendQuestionCard(q);
    }
  }
  return pendingQuestions;
}

// ── Think-tag streaming parser ────────────────────────────────────────────────
function parseStreamText(text) {
  // Returns { mainText, thinkText, isThinking }
  let mainText = '', thinkText = '', remaining = text, isThinking = false;
  while (remaining.length > 0) {
    if (!isThinking) {
      const i = remaining.indexOf('<think>');
      if (i === -1) { mainText += remaining; break; }
      mainText += remaining.slice(0, i);
      remaining = remaining.slice(i + 7);
      isThinking = true;
    } else {
      const i = remaining.indexOf('</think>');
      if (i === -1) { thinkText += remaining; isThinking = true; break; }
      thinkText += remaining.slice(0, i);
      remaining = remaining.slice(i + 8);
      isThinking = false;
    }
  }
  return { mainText: mainText.trimStart(), thinkText, isThinking };
}

// ── Process bubble (thinking/reasoning shown before final reply) ─────────────
let processBubbles = {};   // name → { wrap, itemsEl, headerTimerEl, interval, startTime, itemCount, currentReasoningEl, currentReasoningBody, currentReasoningChars }

function _ensureProcessBubble(name) {
  if (processBubbles[name]) return;
  const c = color(name);
  const isTemp = tempAgentNames.has(name);
  const wrap = document.createElement('div');
  wrap.className = 'proc-wrap';
  wrap.innerHTML = `
    <div class="proc-bubble" id="proc-${name}">
      <div class="proc-header">
        <span class="proc-sender" style="color:${c}">${escHtml(name)}</span>
        ${isTemp ? '<span class="tag temp-tag" style="font-size:9px">临时</span>' : ''}
        <span class="proc-badge"><span class="proc-badge-dot"></span>处理中</span>
        <span class="proc-stat">⏱ <span class="val" id="ptimer-${name}">0.0</span>s &nbsp; <span id="pitems-${name}">0</span> 项</span>
      </div>
      <div class="proc-items" id="pitems-wrap-${name}"></div>
    </div>`;
  el('msgList').appendChild(wrap);
  scrollBottom();

  const startTime = Date.now();
  const interval = setInterval(() => {
    const t = document.getElementById('ptimer-' + name);
    if (t) t.textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  }, 100);

  processBubbles[name] = {
    wrap, startTime, interval,
    itemCount: 0,
    currentReasoningEl: null,
    currentReasoningBody: null,
    currentReasoningChars: 0,
  };
}

function appendReasoningChunk(name, delta) {
  _ensureProcessBubble(name);
  const p = processBubbles[name];
  const itemsWrap = document.getElementById('pitems-wrap-' + name);
  if (!itemsWrap) return;

  // Start a new reasoning block if needed
  if (!p.currentReasoningEl) {
    p.itemCount++;
    const idx = p.itemCount;
    const item = document.createElement('div');
    item.className = 'proc-item reasoning';
    item.id = `pritem-${name}-${idx}`;
    item.innerHTML = `
      <div class="proc-item-header" onclick="toggleProcItem('${name}',${idx})">
        <span class="proc-item-icon">💭</span>
        <span class="proc-item-label">思考 #${idx}</span>
        <span class="proc-item-chars" id="prchars-${name}-${idx}">0 字</span>
        <span class="proc-item-chev">▼</span>
      </div>
      <div class="proc-item-body" id="prbody-${name}-${idx}"></div>`;
    item.classList.add('open');
    itemsWrap.appendChild(item);
    p.currentReasoningEl = item;
    p.currentReasoningBody = document.getElementById(`prbody-${name}-${idx}`);
    p.currentReasoningChars = 0;
    const cntEl = document.getElementById('pitems-' + name);
    if (cntEl) cntEl.textContent = p.itemCount;
  }

  // Append delta to current reasoning block
  p.currentReasoningChars += delta.length;
  if (p.currentReasoningBody) {
    p.currentReasoningBody.textContent += delta;
  }
  const charsEl = document.getElementById(`prchars-${name}-${p.itemCount}`);
  if (charsEl) charsEl.textContent = p.currentReasoningChars + ' 字';
  scrollBottom();
}

function _closeCurrentReasoning(name) {
  const p = processBubbles[name];
  if (!p) return;
  if (p.currentReasoningEl) {
    p.currentReasoningEl.classList.remove('open'); // auto-collapse when switching to text
    p.currentReasoningEl = null;
    p.currentReasoningBody = null;
    p.currentReasoningChars = 0;
  }
}

function toggleProcItem(name, idx) {
  const item = document.getElementById(`pritem-${name}-${idx}`);
  if (item) item.classList.toggle('open');
}

function finalizeProcessBubble(name) {
  const p = processBubbles[name];
  if (!p) return;
  clearInterval(p.interval);
  _closeCurrentReasoning(name);
  const bubble = document.getElementById('proc-' + name);
  if (bubble) {
    bubble.classList.add('done');
    const badge = bubble.querySelector('.proc-badge');
    if (badge) {
      const elapsed = ((Date.now() - p.startTime) / 1000).toFixed(1);
      badge.innerHTML = `✓ ${elapsed}s`;
    }
  }
  delete processBubbles[name];
}

// ── Reply bubble (final text output) ─────────────────────────────────────────
function startStreamBubble(name) {
  if (streamingBubbles[name]) return;
  const c = color(name);
  const isTemp = tempAgentNames.has(name);
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap agent ${isTemp ? 'temp-agent' : ''}`.trim();
  wrap.innerHTML = `
    <div class="msg-meta stream-meta-row">
      <span class="sender" style="color:${c}">${escHtml(name)}</span>
      ${isTemp ? '<span class="tag temp-tag">临时</span>' : ''}
      <span class="stream-live-badge"><span class="stream-live-dot"></span>回复中</span>
      <span class="stream-stat">⏱ <span class="val" id="stimer-${name}">0.0</span>s</span>
      <span class="stream-stat"><span class="val" id="schars-${name}">0</span> 字</span>
    </div>
    <div class="stream-tc-wrap" id="stream-tc-${name}" style="display:none" aria-hidden="true"></div>
    <div class="bubble streaming" id="stream-${name}"></div>`;
  el('msgList').appendChild(wrap);
  scrollBottom();

  const startTime = Date.now();
  const interval = setInterval(() => {
    const t = document.getElementById('stimer-' + name);
    if (t) t.textContent = ((Date.now() - startTime) / 1000).toFixed(1);
  }, 100);

  streamingBubbles[name] = { wrap, mainEl: document.getElementById('stream-' + name), text: '', interval, startTime };
  setTyping(name, true);
}

function appendDelta(name, delta) {
  // Close any open reasoning block when main text starts arriving
  if (processBubbles[name]) _closeCurrentReasoning(name);

  // Handle <think> tags embedded in text (for models that use text-based thinking)
  if (!streamingBubbles[name]) startStreamBubble(name);
  const s = streamingBubbles[name];
  s.text += delta;

  const { mainText, thinkText, isThinking } = parseStreamText(s.text);
  const { cleaned, toolBlocks, partial } = splitStreamingToolCalls(mainText);

  // Route <think> content into the process bubble
  if (thinkText || isThinking) {
    _ensureProcessBubble(name);
    // Sync think text to process bubble (replace entire content for simplicity)
    const p = processBubbles[name];
    if (!p.currentReasoningEl && (thinkText || isThinking)) {
      appendReasoningChunk(name, "");  // creates the block
    }
    if (p.currentReasoningBody) {
      const display = thinkText + (isThinking ? ' ▋' : '');
      p.currentReasoningBody.textContent = display;
      p.currentReasoningChars = display.length;
      const charsEl = document.getElementById(`prchars-${name}-${p.itemCount}`);
      if (charsEl) charsEl.textContent = p.currentReasoningChars + ' 字';
    }
  }

  const toolOnlyStreaming = !cleaned.trim() && (toolBlocks.length > 0 || partial != null);
  s.mainEl.style.display = toolOnlyStreaming ? 'none' : '';
  s.mainEl.textContent = cleaned;
  updateStreamToolCallFold(name, toolBlocks, partial);
  const charsEl = document.getElementById('schars-' + name);
  if (charsEl) charsEl.textContent = String(cleaned.length);
  scrollBottom();
}

function finalizeStream(name, env) {
  // Finalize process bubble first
  if (processBubbles[name]) finalizeProcessBubble(name);

  const s = streamingBubbles[name];
  if (s) {
    clearInterval(s.interval);
    s.wrap.remove();
    delete streamingBubbles[name];
  }
  setTyping(name, false);
  if (env) appendMessage(env);
}

// ── WebSocket ────────────────────────────────────────────────────────────────
let _intentionalClose = false;   // true = deliberate switch, reconnect immediately

function connect() {
  ws = new WebSocket(WS_URL);   // WS_URL is always current
  el('threadLabel').textContent = 'Thread: ' + THREAD_ID;
  ws.onopen = () => { el('statusDot').className = 'status-dot'; el('sendBtn').disabled = false; };
  ws.onclose = () => {
    el('statusDot').className = 'status-dot offline';
    el('sendBtn').disabled = true;
    const delay = _intentionalClose ? 0 : 3000;
    _intentionalClose = false;
    setTimeout(connect, delay);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = ({ data }) => {
    let ev; try { ev = JSON.parse(data); } catch { return; }

    if (ev.type === 'init') {
      const proj = ev.project || currentProject;
      if (proj && proj !== currentProject) {
        // First connection or project changed server-side — ensure our thread matches
        currentProject = proj;
        el('projectName').textContent = proj;
        const correctTid = getThreadId(proj);
        if (correctTid !== THREAD_ID) {
          // Reconnect with the right thread_id
          THREAD_ID = correctTid;
          WS_URL = `ws://${location.host}/ws/${THREAD_ID}`;
          _intentionalClose = true;
          ws.close();
          return;
        }
        localStorage.setItem('thread_id::__last__', THREAD_ID);
      }
      renderAgents(ev.agents || []);
      fetchAllSkills();
      el('msgList').innerHTML = '';
      (ev.log || []).forEach(appendMessage);
      fetchProjects();
      fetchConversations();
      fetchTasks();
      fetchPendingQuestions();
      fetchThreadStatus();
      return;
    }
    if (ev.type === 'envelope_recorded') {
      appendMessage(ev.envelope);
      // system_advisory envelopes are injected into agent inbox but the agent
      // does not start streaming immediately — skip pre-emptive bubble creation
      if (!ev.envelope.metadata?.system_advisory) {
        // Only pre-create stream bubbles for direct recipients (To).
        // CC recipients get their bubble lazily on first text_delta to avoid ghost bubbles.
        (ev.envelope.to||[]).forEach(n => { if (n !== 'user') startStreamBubble(n); });
      }
      return;
    }
    if (ev.type === 'text_delta') { appendDelta(ev.agent, ev.delta); return; }
    if (ev.type === 'reasoning_delta') { appendReasoningChunk(ev.agent, ev.delta); return; }
    if (ev.type === 'agent_done') { finalizeStream(ev.agent, ev.envelope); return; }
    if (ev.type === 'tool_results') {
      const items = Array.isArray(ev.results) ? ev.results : [];
      items.forEach(item => {
        appendToolResult(item.tool, item.result, item.triggered_by);
      });
      if (items.some(item => item.tool === 'recruit_fixed' || item.tool === 'dismiss_member')) {
        refreshAgentsWithRetry(8, 350);
      }
      return;
    }
    // Backward compatibility for older backend events.
    if (ev.type === 'tool_result') {
      appendToolResult(ev.tool, ev.result, ev.triggered_by);
      if (ev.tool === 'recruit_fixed' || ev.tool === 'dismiss_member') {
        refreshAgentsWithRetry(8, 350);
      }
      return;
    }
    if (ev.type === 'agents_updated') {
      renderAgents(ev.agents || []);
      // Hot-reload may lag a little; retry pull once in background for consistency.
      refreshAgentsWithRetry(8, 350);
      showToast('团队成员已更新');
      return;
    }
    if (ev.type === 'escalation') {
      appendEscalation(ev);
      return;
    }
    if (ev.type === 'context_updated') {
      el('ctxBadge').classList.add('show');
      setTimeout(() => el('ctxBadge').classList.remove('show'), 8000);
      return;
    }
    if (ev.type === 'checkpoint_restored') {
      showToast(`✅ 已回滚到检查点「${ev.note || ''}」`);
      // Clear current UI and reconnect to load restored content
      el('msgList').innerHTML = '';
      _intentionalClose = true;
      ws.close();
      return;
    }
    if (ev.type === 'task_event') {
      if (ev.task) {
        updateTaskCardInPlace(ev.task);
        appendTaskCard(ev.task, ev.event || ev.subtype || 'updated');
      }
      fetchTasks();
      return;
    }
    if (ev.type === 'user_question') {
      if (ev.question) appendQuestionCard(ev.question);
      fetchPendingQuestions();
      return;
    }
    if (ev.type === 'user_answer_received') {
      document.getElementById(`q-card-${ev.question_id}`)?.remove();
      fetchPendingQuestions();
      return;
    }
    if (ev.type === 'internal_message') {
      if (ev.envelope) appendMessage(ev.envelope);
      return;
    }
    if (ev.type === 'thread_paused') {
      threadPaused = Boolean(ev.is_paused);
      renderThreadPauseState();
      return;
    }
    if (ev.type === 'heartbeat') {
      heartbeatSilentCount = Number(ev.silent_count || 0);
      renderThreadPauseState();
      return;
    }
    if (ev.type === 'error') {
      if (ev.agent) finalizeStream(ev.agent, null);
      const e = document.createElement('div');
      e.className = 'sys-msg';
      e.style.borderColor = '#7f1d1d';
      e.style.color = '#fca5a5';
      e.textContent = `⚠ ${ev.agent||'system'}: ${ev.message}`;
      el('msgList').appendChild(e);
      scrollBottom();
    }
  };
}

// ── Send ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  const to = Object.keys(selection).filter(n => selection[n] === 'to');
  const cc = Object.keys(selection).filter(n => selection[n] === 'cc');
  const content = el('bodyField').value.trim();
  const images = pendingImages.map(i => i.dataUri);
  if (!content && !images.length) return;
  if (!to.length) { showToast('请先选择至少一个 To 收件人'); return; }
  const payload = { sender: 'user', to, cc, content };
  if (images.length) payload.images = images;
  ws.send(JSON.stringify(payload));
  el('bodyField').value = '';
  el('bodyField').style.height = 'auto';
  pendingImages = [];
  renderImagePreviews();
}

el('bodyField').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); sendMessage(); }
});
el('bodyField').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Image paste / upload ──────────────────────────────────────────────────────
el('bodyField').addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) addImageFile(file);
    }
  }
});

function handleFileInput(evt) {
  for (const file of evt.target.files) addImageFile(file);
  evt.target.value = '';
}

function addImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImages.push({ dataUri: ev.target.result, name: file.name });
    renderImagePreviews();
  };
  reader.readAsDataURL(file);
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  renderImagePreviews();
}

function renderImagePreviews() {
  const container = el('imgPreviews');
  container.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-preview-wrap';
    wrap.innerHTML = `<img src="${img.dataUri}" alt="img${i}">
      <button class="rm-img" onclick="removeImage(${i})">✕</button>`;
    container.appendChild(wrap);
  });
}
el('addAgentModal').addEventListener('click', e => { if (e.target === el('addAgentModal')) closeAddAgentModal(); });
el('sendBtn').disabled = true;
connect();
</script>
